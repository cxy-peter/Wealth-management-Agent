name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall backend scripts eval
      - name: Generate synthetic weekly data
        run: python scripts/generate_weekly_report_universe.py
      - name: Pytest
        run: pytest
      - name: Report eval
        run: python eval/run_eval.py
      - name: Route optimization eval
        run: python eval/run_route_optimization.py
      - name: Contextual bandit eval
        run: python eval/run_contextual_bandit.py
      - name: Build DPO preference data
        run: python -m backend.app.dpo.dpo_dataset_builder
      - name: DPO style eval
        run: python -m backend.app.dpo.eval_dpo_report_style
      - name: DPO agent alignment eval
        run: python -m backend.app.dpo.eval_dpo_agent_alignment
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend build
        working-directory: frontend
        run: npm run build
