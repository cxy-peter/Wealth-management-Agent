services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      WEALTH_AGENT_DATA_DIR: /app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      VITE_WEALTH_AGENT_API_BASE: http://127.0.0.1:8000
    depends_on:
      - backend
